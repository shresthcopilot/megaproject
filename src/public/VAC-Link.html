<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Link Generate Form</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f2f4f8;
      min-height: 100vh;
      padding: 20px;
    }

    .navbar {
      height: 70px;
      background: #1e3c72;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 40px;
      margin-bottom: 20px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .left-section {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo {
      height: 55px;
    }

    .text h1 {
      font-size: 18px;
      color: #fff;
    }

    .text p {
      font-size: 12px;
      color: #dcdcdc;
    }

    .right-section {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .profile-container {
      position: relative;
    }

    .profile-btn {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      border: none;
      background: #2a5298;
      color: #fff;
      cursor: pointer;
      font-size: 18px;
    }

    .profile-menu {
      position: absolute;
      top: 55px;
      right: 0;
      background: #fff;
      border-radius: 8px;
      min-width: 200px;
      display: none;
      z-index: 1000;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    }

    .profile-menu.active {
      display: block;
    }

    .profile-menu-item {
      padding: 12px 16px;
      text-decoration: none;
      color: #333;
      display: block;
      border-bottom: 1px solid #eee;
    }

    .profile-menu-item:hover {
      background: #f5f5f5;
    }

    .logout-btn {
      background: #dc3545;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
    }

    .logout-btn:hover {
      opacity: 0.9;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      background: #fff;
      border-radius: 10px;
      padding: 30px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    }

    .header {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #fff;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      margin-bottom: 25px;
    }

    .form-container {
      padding: 20px 0;
    }

    .course-section {
      background: #f8f9fa;
      border-radius: 8px;
      border: 1px solid #e1e5e9;
      padding: 20px;
      margin-bottom: 20px;
    }

    .course-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 15px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .form-group input {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    .form-group input:focus {
      outline: none;
      border-color: #2a5298;
    }

    .form-group input.error {
      border-color: #e74c3c;
      background: #fdf2f2;
    }

    .error-message {
      font-size: 12px;
      color: #e74c3c;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .button-group {
      display: flex;
      gap: 15px;
      margin-top: 25px;
      flex-wrap: wrap;
    }

    .submit-btn,
    .view-btn,
    .form-btn {
      flex: 1;
      min-width: 180px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      color: #fff;
    }

    .submit-btn {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
    }

    .view-btn {
      background: #fd7e14;
    }

    .form-btn {
      background: #6c757d;
    }

    .submit-btn:hover,
    .view-btn:hover,
    .form-btn:hover {
      opacity: 0.9;
    }

    .success-section {
      display: none;
      margin-top: 25px;
      padding: 25px;
      border-radius: 8px;
      background: #d4edda;
      border: 2px solid #28a745;
      text-align: center;
    }

    .success-section.show {
      display: block;
    }

    .student-link {
      display: inline-block;
      margin: 15px 0;
      padding: 10px 20px;
      border-radius: 6px;
      background: #2a5298;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
    }

    .copy-btn {
      padding: 10px 18px;
      border: none;
      border-radius: 6px;
      background: #6b7280;
      color: #fff;
      cursor: pointer;
    }

    .copy-btn:hover {
      opacity: 0.9;
    }

    @media(max-width:768px) {
      .form-container {
        padding: 10px 0;
      }

      .button-group {
        flex-direction: column;
      }
    }
  </style>

</head>

<body>


  <nav class="navbar">
    <div class="left-section">
      <img src="../images/logo.png" class="logo" />
      <div class="text">
        <h1>Prestige Institute of Research & Management</h1>
        <p>Gwalior</p>
      </div>
    </div>

    <div class="right-section">
      <div class="profile-container">
        <button id="profileBtn" class="profile-btn">
          <i class="fas fa-user"></i>
        </button>
        <div id="profileMenu" class="profile-menu">
          <a class="profile-menu-item" href="#">View Profile</a>
          <a class="profile-menu-item" href="#">Edit Profile</a>
          <a class="profile-menu-item" href="#">Change Password</a>
        </div>
      </div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </nav>


  <div class="container">
    <div class="header">
      <h1>Value-Added Courses (VAC)</h1>
    </div>

    <div class="form-container">

      <div class="course-section" data-course-id="1">
        <div class="course-title"> Course Details</div>

        <div class="form-grid">
          <div class="form-group">
            <label>Course Name *</label>
            <input id="courseName1" />
            <div id="courseNameError1" class="error-message">Required</div>
          </div>

          <div class="form-group">
            <label>Course Code *</label>
            <input id="courseCode1" />
            <div id="courseCodeError1" class="error-message">Required</div>
          </div>

          <div class="form-group">
            <label>Duration *</label>
            <input type="number" id="duration1" min="1" required/>
            <div id="durationError1" class="error-message">Invalid</div>
          </div>

          <div class="form-group">
            <label>Times Offered *</label>
            <input type="number" id="timesOffered1" min="1" required />
            <div id="timesError1" class="error-message">Invalid</div>
          </div>

          <div class="form-group">
            <label>Coordinator *</label>
            <input id="coordinator1" required />
            <div id="coordinatorError1" class="error-message">Required</div>
          </div>
        </div>
      </div>

      <div class="button-group">
        <button id="submitVacBtn" class="submit-btn">Link Generate</button>
        <a href="VAC-Dashboard.html" class="view-btn">Dashboard</a>
        <a href="VAC-form.html" class="form-btn">Form</a>
      </div>

      <div id="successSection" class="success-section">
        <h3>🎉 VAC Saved</h3>
        <a id="studentFormLink" class="student-link" target="_blank"></a>
        <br />
        <button id="copyBtn" class="copy-btn">Copy Link</button>
      </div>
    </div>
  </div>

  <script>
    const submitBtn = document.getElementById('submitVacBtn');
    const successSection = document.getElementById('successSection');
    const studentLink = document.getElementById('studentFormLink');
    const copyBtn = document.getElementById('copyBtn');

    submitBtn.addEventListener('click', async () => {
      const payload = {
        courses: [{
          courseName: courseName1.value.trim(),
          courseCode: courseCode1.value.trim(),
          duration: +duration1.value || 0,
          timesOffered: +timesOffered1.value || 0,
          coordinator: coordinator1.value.trim()
        }],
        program_Id: ""
      };

      const res = await fetch('/api/vac/entries', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + localStorage.getItem('token')
        },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        const msg = await res.text();
        alert(msg || "Failed to create VAC entry");
        return;
      }

      const data = await res.json();
      if (!data.id) {
        alert("VAC entry created but entry id missing in response.");
        return;
      }

      const link = `Student-Registration-form.html?vacId=${encodeURIComponent(data.id)}`;

      studentLink.href = link;
      studentLink.textContent = link;
      successSection.classList.add('show');
    });

    copyBtn.onclick = () => navigator.clipboard.writeText(studentLink.href);

    profileBtn.onclick = e => {
      e.stopPropagation();
      profileMenu.classList.toggle('active');
    };
    document.onclick = () => profileMenu.classList.remove('active');

    function logout() {
      localStorage.clear();
      location.href = 'index.html';
    }
  </script>

</body>

</html>
