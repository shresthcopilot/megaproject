<!DOCTYPE html>
<html>
<head>
<title>Collaborations & Partnerships</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#eef1f7;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:10px;
}

.container{
background:white;
width:100%;
max-width:520px;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.top-bar{
height:10px;
background:#2f466a;
border-radius:10px 10px 0 0;
margin:-20px -20px 15px -20px;
}

h2{
text-align:center;
color:#2f466a;
margin-bottom:5px;
font-size:22px;
}

p{
text-align:center;
color:#777;
font-size:14px;
margin-bottom:20px;
}

.section{
border:1px solid #ddd;
padding:12px;
margin-top:12px;
border-radius:10px;
}

.section b{
display:block;
margin-bottom:8px;
color:#333;
font-size:14px;
}

.row{
display:flex;
gap:10px;
}

input, select{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:6px;
margin-top:8px;
outline:none;
font-size:14px;
}

input:focus, select:focus{
border-color:#2f466a;
}

.button{
margin-top:20px;
text-align:center;
}

button{
width:100%;
background:#2f466a;
color:white;
border:none;
padding:12px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1f3555;
}

/* 🔥 RESPONSIVE PART */
@media(max-width:600px){

h2{
font-size:18px;
}

p{
font-size:12px;
}

.row{
flex-direction:column;
}

.container{
padding:15px;
}

input, select{
font-size:13px;
}

button{
font-size:14px;
padding:10px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="top-bar"></div>

<h2>Collaborations & Partnerships</h2>

<p>Monitor and analyze student academic and career progression data</p>

<div class="section">

<b>Alumni Collaborations:</b>

<div class="row">
<select id="type">
<option value="">Type</option>
<option>Workshop</option>
<option>Seminar</option>
</select>

<input type="text" id="output" placeholder="Output">
</div>

<input type="number" id="students" placeholder="Number of Students Enrolled">

</div>

<div class="section">
<b>External Organisation Collaborations:</b>
<input type="text" id="mou" placeholder="MoU Details">
</div>

<div class="section">
<b>Activity/Event Conducted:</b>
<input type="text" id="activity">
</div>

<div class="section">
<b>Document Links:</b>
<input type="text" id="doc" placeholder="+">
</div>

<div class="button">
<button onclick="submitData()">View Report</button>
</div>

</div>

<script>

function submitData(){

let type=document.getElementById("type").value;
let output=document.getElementById("output").value;
let students=document.getElementById("students").value;
let mou=document.getElementById("mou").value;
let activity=document.getElementById("activity").value;
let doc=document.getElementById("doc").value;

if(!type || !output || !students || !mou || !activity || !doc){
alert("Please fill all fields");
return;
}

fetch("/api/collaboration/save",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({type,output,students,mou,activity,doc})
})
.then(res=>res.json())
.then(()=>alert("Saved Successfully"))
.catch(()=>alert("Error"));

}

</script>

</body>
</html>
