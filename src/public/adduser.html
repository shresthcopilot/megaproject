<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Registration</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: url('../images/WhatsApp\ Image\ 2026-01-21\ at\ 18.17.04.jpeg') center/cover no-repeat fixed;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 380px;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(6px);
      padding: 30px 25px;
      border-radius: 16px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
      text-align: center;
    }

    .container img {
      width: 110px;
      margin-bottom: 10px;
    }

    h2 {
      margin-bottom: 20px;
      font-size: 22px;
    }

    /* INPUTS */
    .input-box {
      position: relative;
      margin-bottom: 16px;
    }

    .input-box input {
      width: 100%;
      padding: 12px 14px 12px 38px;
      border-radius: 10px;
      border: none;
      background: #f2f2f2;
      font-size: 14px;
      outline: none;
    }

    .input-box span {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
    }

    /* CUSTOM SELECT */
    .custom-select {
      width: 100%;
      background: #f2f2f2;
      padding: 12px 14px 12px 38px;
      border-radius: 10px;
      position: relative;
      cursor: pointer;
      text-align: left;
    }

    .custom-select::after {
      content: "▼";
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
    }

    .options {
      position: absolute;
      top: 115%;
      left: 0;
      width: 100%;
      background: white;
      border-radius: 10px;
      list-style: none;
      margin: 0;
      padding: 0;
      display: none;
      max-height: 200px;
      overflow-y: auto;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
      z-index: 99;
    }

    .options li {
      padding: 10px;
      cursor: pointer;
    }

    .options li:hover {
      background: #1b2d83;
      color: white;
    }

    /* BUTTON */
    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #1b2d83;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #142161;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* MOBILE */
    @media (max-width: 420px) {
      .container {
        padding: 25px 18px;
      }

      h2 {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <img src="../images/logo.png" alt="Logo">
    <h2>User Registration</h2>

    <form id="registerForm">

      <div class="input-box">
        <span>👤</span>
        <input type="text" id="username" placeholder="Username" required minlength="3" autocomplete="username">
      </div>

      <div class="input-box">
        <span>🔒</span>
        <input type="password" id="password" placeholder="Password" required minlength="5" autocomplete="new-password">
      </div>
      <div class="input-box">
        <span>🔐</span>
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required minlength="5"
          autocomplete="new-password" />
      </div>

      <p id="passwordError" style="color:red;font-size:13px;display:none;">
        Passwords do not match
      </p>


      <div class="input-box">
        <div class="custom-select" id="customSelect">
          <span style="position:absolute;left:12px;">⚙</span>
          <div class="selected">Select Role</div>
          <ul class="options">
            <li data-value="faculty">Faculty</li>
            <li data-value="vac">VAC</li>
            <li data-value="pc">Pogram coodinator</li>
            <li data-value="e-content">E-Content</li>
            <li data-value="library">Library</li>
          </ul>
        </div>
      </div>

      <button type="submit" id="submitBtn">Register</button>

    </form>
  </div>

 <script>
const form = document.getElementById("registerForm");
const btn = document.getElementById("submitBtn");

// Dropdown
const customSelect = document.getElementById("customSelect");
const selected = customSelect.querySelector(".selected");
const optionList = customSelect.querySelector(".options");
const options = optionList.querySelectorAll("li");

// Inputs
const usernameInput = document.getElementById("username");
const passwordInput = document.getElementById("password");
const confirmInput = document.getElementById("confirmPassword");
const passwordError = document.getElementById("passwordError");

// ================== UTIL ==================

// Sanitize input (basic XSS protection)
function sanitizeInput(input) {
  return input.replace(/[<>"'`;(){}]/g, "").trim();
}

// Show message (replace alert)
function showMessage(msg, type = "error") {
  console.log(type.toUpperCase() + ":", msg);
  alert(msg); // replace with UI later if needed
}

// ================== VALIDATION ==================

function validateUsername(username) {
  if (!username) return "Username is required";
  if (username.length < 3) return "Username must be at least 3 characters";
  if (!/^[a-zA-Z0-9_]+$/.test(username)) {
    return "Only letters, numbers, underscore allowed";
  }
  return null;
}

function validatePassword(password) {
  if (password.length < 8) return "Minimum 8 characters required";
  if (!/[A-Z]/.test(password)) return "Must include uppercase letter";
  if (!/[a-z]/.test(password)) return "Must include lowercase letter";
  if (!/[0-9]/.test(password)) return "Must include a number";
  if (!/[@$!%*?&]/.test(password)) return "Must include special character (@$!%*?&)";
  return null;
}

function validatePasswordsMatch() {
  if (!confirmInput.value) {
    passwordError.style.display = "none";
    return true;
  }

  if (passwordInput.value !== confirmInput.value) {
    passwordError.style.display = "block";
    return false;
  }

  passwordError.style.display = "none";
  return true;
}

// Live validation
passwordInput.addEventListener("input", validatePasswordsMatch);
confirmInput.addEventListener("input", validatePasswordsMatch);

// ================== DROPDOWN ==================

selected.addEventListener("click", () => {
  optionList.style.display =
    optionList.style.display === "block" ? "none" : "block";
});

options.forEach(opt => {
  opt.addEventListener("click", () => {
    selected.textContent = opt.textContent;
    selected.dataset.value = opt.dataset.value;
    optionList.style.display = "none";
  });
});

document.addEventListener("click", e => {
  if (!customSelect.contains(e.target)) optionList.style.display = "none";
});

// ================== SUBMIT ==================

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  let username = sanitizeInput(usernameInput.value);
  let password = sanitizeInput(passwordInput.value);
  let confirmPassword = sanitizeInput(confirmInput.value);
  const role = selected.dataset.value;

  // 🔍 Validate
  const userError = validateUsername(username);
  if (userError) return showMessage(userError);

  const passError = validatePassword(password);
  if (passError) return showMessage(passError);

  if (password !== confirmPassword) {
    return showMessage("Passwords do not match");
  }

  if (!role) return showMessage("Please select a role");

  // 🚫 Prevent multiple clicks
  btn.disabled = true;
  btn.textContent = "Registering...";

  try {
    const res = await fetch("/api/register", {
      method: "POST",
      credentials: "include",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ username, password, role })
    });

    let data;
    try {
      data = await res.json();
    } catch {
      throw new Error("Invalid server response");
    }

    if (!res.ok) throw new Error(data.message || "Registration failed");

    showMessage("Registration successful", "success");

    // Redirect after short delay
    setTimeout(() => {
      window.location.href = "admindashboard.html";
    }, 1000);

  } catch (err) {
    showMessage(err.message || "Server error");
  } finally {
    btn.disabled = false;
    btn.textContent = "Register";
  }
});
</script>
  
  

</body>

</html>
