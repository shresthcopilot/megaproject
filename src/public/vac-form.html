<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VAC Form</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg,
          #edf7ff 0%,
          #c6e3ff 25%,
          #86c2ff 60%,
          #4a90e2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      margin: 40px auto;
      padding: 40px;
      border-radius: 22px;
      background: linear-gradient(135deg,
          rgba(255, 255, 255, 0.35),
          rgba(255, 255, 255, 0.15));
      backdrop-filter: blur(22px) saturate(160%);
      -webkit-backdrop-filter: blur(22px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.35);
      box-shadow:
        0 30px 60px rgba(0, 0, 0, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.4);
      position: relative;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg,
          rgba(255, 255, 255, 0.35),
          rgba(255, 255, 255, 0.15));
      backdrop-filter: blur(22px) saturate(160%);
      -webkit-backdrop-filter: blur(22px) saturate(160%);
      color: rgb(56, 56, 56);
      border-radius: 10px;
      padding: 25px;
      text-align: center;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .form-container {
      padding: 40px;
    }

    .section-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 30px;
    }

    .section-table th,
    .section-table td {
      padding: 16px 20px;
      text-align: left;
      border-bottom: 1px solid #e1e5e9;
    }

    .section-table th {
      background: #f8f9fa;
      font-weight: 600;
      color: #333;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      margin-bottom: 30px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;

      background: linear-gradient(135deg,
          rgba(243, 241, 241, 0.35),
          rgba(255, 255, 255, 0.15));

      backdrop-filter: blur(22px) saturate(160%);
      -webkit-backdrop-filter: blur(22px) saturate(160%);

      border: 1px solid rgba(255, 255, 255, 0.4);

      color: #1f2937;
      font-size: 15px;

      outline: none;
      position: relative;

      box-shadow:
        0 8px 20px rgba(0, 0, 0, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.5);

      transition: all 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form-group input.error {
      border-color: #e74c3c !important;
      background: #fdf2f2;
    }

    .error-message {
      color: #e74c3c;
      font-size: 12px;
      margin-top: 6px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .course-section {
      background: linear-gradient(135deg,
          rgba(255, 255, 255, 0.35),
          rgba(255, 255, 255, 0.15));
      backdrop-filter: blur(22px) saturate(160%);
      -webkit-backdrop-filter: blur(22px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.35);
      box-shadow:
        0 30px 60px rgba(0, 0, 0, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.4);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      border: 2px solid #e9ecef;
    }

    .course-title {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      margin-bottom: 20px;
    }

    .button-group {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .submit-btn,
    .view-btn {
      justify-content: center;
      flex: 1;
      min-width: 200px;
      padding: 18px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .submit-btn {
      margin-top: 20px;
      width: 100%;
      padding: 14px 16px;

      background: linear-gradient(135deg,
          rgba(255, 255, 255, 0.45),
          rgba(255, 255, 255, 0.18));

      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);

      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.4);

      color: #2c2c2c;
      font-size: 16px;
      font-weight: 600;

      cursor: pointer;
      position: relative;
      overflow: hidden;

      box-shadow:
        0 10px 25px rgba(0, 0, 0, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.5);

      transition: transform 0.3s ease;
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(40, 167, 69, 0.3);
    }

    .view-btn {
      background: linear-gradient(135deg, #fd7e14 0%, #f76707 100%);
      color: white;
    }

    .view-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(253, 126, 20, 0.3);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }


    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .success-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .student-link {
      display: inline-block;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 14px 28px;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 16px;
      margin: 20px 0;
      transition: all 0.3s ease;
    }

    .student-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    .copy-btn {
      background: #6b7280;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      margin-top: 10px;
      transition: background 0.3s ease;
    }

    .copy-btn:hover {
      background: #4b5563;
    }

    @media (max-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .form-container {
        padding: 24px;
      }

      .button-group {
        flex-direction: column;
      }
    }

    /* popup  section*/

    /* .btn {
            padding: 10px 60px;
            background: #fff;
            border: 0;
            outline: none;
            cursor: pointer;
            font-size: 22px;
            font-weight: 500;
            border-radius: 30px;
        } */

    .popup {
      width: 400px;
      background: #fff;
      border-radius: 6px;
      position: absolute;
      top: 0;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.1);
      text-align: center;
      padding: 0 30px 30px;
      color: #333;
      visibility: hidden;
      transition: transform 0.4s, top 0.4s;
    }

    .open-popup {
      visibility: visible;
      top: 50%;
      transform: translate(-50%, -50%) scale(1);
    }

    .popup img {
      width: 100px;
      margin-top: -50px;
      border-radius: 50%;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }

    .popup h2 {
      font-size: 38px;
      font-weight: 500;
      margin: 30px 0 10px;
    }

    .popup button {
      width: 100%;
      margin-top: 50px;
      padding: 10px 0;
      background: #6fd649;
      color: #fff;
      border: 0;
      outline: none;
      border-radius: 20px;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>VAC Submit Form</h1>
    </div>

    <div class="form-container">

      <div id="coursesContainer">
        <div class="course-section" data-course-id="1">
          <div class="course-title">Details</div>
          <div class="form-grid">
            <div class="form-group">
              <label for="courseName1">Course Name *</label>
              <input type="text" id="courseName1" placeholder="e.g., Web Development" required>
              <div class="error-message" id="courseNameError1">Course name is required</div>
            </div>

            <div class="form-group">
              <label for="courseCode1">VAC Course Code *</label>
              <input type="text" id="courseCode1" placeholder="e.g., VAC001" required>
              <div class="error-message" id="courseCodeError1">Course code is required</div>
            </div>

            <div class="form-group">
              <label for="programId1">Program ID (optional)</label>
              <input type="text" id="programId1" placeholder="Program ID or UUID" />
            </div>

            <div class="form-group">
              <label for="duration1">Duration (Hours) *</label>
              <input type="number" id="duration1" min="1" placeholder="e.g., 30" required>
              <div class="error-message" id="durationError1">Duration must be at least 1 hour</div>
            </div>

            <div class="form-group">
              <label for="timesOffered1">No. of Times Offered *</label>
              <input type="number" id="timesOffered1" min="1" placeholder="e.g., 2" required>
              <div class="error-message" id="timesError1">Must be offered at least once</div>
            </div>

            <div class="form-group">
              <label for="studentsEnrolled1">Students Enrolled</label>
              <input type="text" id="studentsEnrolled1" placeholder="e.g., 45 or John, Jane...">
            </div>

            <div class="form-group">
              <label for="studentsCompleted1">Students Completed</label>
              <input type="text" id="studentsCompleted1" placeholder="e.g., 42 or list...">
            </div>

            <div class="form-group">
              <label for="brochureLink1">Brochure/Certificate Link</label>
              <input type="url" id="brochureLink1" placeholder="https://example.com/brochure.pdf">
            </div>

            <div class="form-group">
              <label for="coordinator1">VAC Coordinator Name *</label>
              <input type="text" id="coordinator1" placeholder="e.g., Dr. John Doe" required>
              <div class="error-message" id="coordinatorError1">Coordinator name is required</div>
            </div>

            <div class="form-group">
              <label for="coordinator1">Upload Brochure / Certificate (PDF, JPG, PNG, CSV)</label>
              <input type="file" id="certificateUpload" name="certificateUpload" accept=".pdf,.jpg,.jpeg,.png, .csv"
                required />
              <div class="error-message" id="certificateUpload">Upload Documents Here</div>
            </div>
          </div>
        </div>
      </div>

      <div class="button-group">
        <button id="submitVacBtn" class="submit-btn"> Send Data</button>

        <div class="popup" id="popup">
          <img src="../images/check.jpg" alt="Check Mark">
          <h2>Thank You!</h2>
          <p>Your Form Successfully Submitted. Thanks!</p>
          <button type="button" onclick="closePopup()">OK</button>
        </div>
      </div>

      <script>

        // popup section
        let popup = document.getElementById("popup");
        function openPopup() {
          popup.classList.add("open-popup");
        }
        function closePopup() {
          popup.classList.remove("open-popup");
        }

        (function () {
          const submitBtn = document.getElementById("submitVacBtn");

          async function submitVac() {
            submitBtn.disabled = true;
            submitBtn.textContent = "Sending...";

            const courseName = document.getElementById("courseName1").value.trim();
            const courseCode = document.getElementById("courseCode1").value.trim();
            const duration = document.getElementById("duration1").value;
            const timesOffered = document.getElementById("timesOffered1").value;
            const studentsEnrolled = document.getElementById("studentsEnrolled1").value.trim();
            const studentsCompleted = document.getElementById("studentsCompleted1").value.trim();
            const brochureInput = document.getElementById("certificateUpload");
            const coordinator = document.getElementById("coordinator1").value.trim();

            if (!courseName || !courseCode || !duration || !timesOffered || !coordinator) {
              alert("Please fill required fields: Course Name, Course Code, Duration, Times Offered, Coordinator");
              submitBtn.disabled = false;
              submitBtn.textContent = "ðŸ“© Send To Program-Coordinator ";
              return;
            }

            let brochureLink = "";
            if (brochureInput && brochureInput.files && brochureInput.files.length) {
              const f = brochureInput.files[0];
              const name = f.name || '';
              const ext = name.split('.').pop().toLowerCase();
              if (ext === 'csv') {
                alert('CSV files are not accepted. Please upload PDF, JPG or PNG files only.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'ðŸ“© Send To Program-Coordinator ';
                return;
              }
              brochureLink = name;
            }

            const payload = {
              program_Id: (document.getElementById('programId1') && document.getElementById('programId1').value) ? document.getElementById('programId1').value.trim() : "",
              courses: [
                {
                  courseName,
                  courseCode,
                  duration: Number(duration) || 0,
                  timesOffered: Number(timesOffered) || 0,
                  studentsEnrolled,
                  studentsCompleted,
                  brochureLink,
                  coordinator,
                },
              ],
            };

            const token = (() => {
              try {
                return localStorage.getItem("token");
              } catch (e) {
                return null;
              }
            })();

            if (!token) {
              alert("You must be logged in to submit a VAC entry. Please login first.");
              submitBtn.disabled = false;
              submitBtn.textContent = "ðŸ“© Send To Program-Coordinator ";
              return;
            }

            try {
              // Save VAC entry to localStorage instead of sending to DB
              const localEntry = {
                id: 'local-' + Date.now(),
                createdAt: new Date().toISOString(),
                courses: payload.courses,
                local: true
              };
              const existing = JSON.parse(localStorage.getItem('vac:local') || '[]');
              existing.unshift(localEntry);
              localStorage.setItem('vac:local', JSON.stringify(existing));

              alert('VAC entry saved locally and will appear on your dashboard.');
              openPopup();
              window.location.href = 'pcdashboard.html';
            } catch (err) {
              console.error(err);
              alert('Error while saving VAC entry locally.');
              submitBtn.disabled = false;
              submitBtn.textContent = 'ðŸ“© Send To Program-Coordinator ';
            }
          }

          submitBtn.addEventListener("click", submitVac);
        })();
      </script>
</body>

</html>
