<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Academics Reports</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f4f7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#fff;
    width:700px;
    padding:30px 40px;
    border-radius:14px;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
    border-top:6px solid #1f3c88;
}

h2{
    text-align:center;
    color:#1f3c88;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:30px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:22px 30px;
}

label{
    font-weight:600;
    margin-bottom:6px;
    display:block;
}

select{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:30px;
}

.btn-primary{
    background:#1f3c88;
    color:white;
    padding:12px 26px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.btn-outline{
    background:white;
    color:#1f3c88;
    padding:12px 26px;
    border:2px solid #1f3c88;
    border-radius:8px;
    cursor:pointer;
}

.hidden{
    display:none;
}
</style>
</head>

<body>

<div class="card">
    <h2>Academics Reports</h2>
    <div class="subtitle">Select parameters to generate your academic data</div>

    <div class="grid">

        <div>
            <label>Department</label>
            <select id="department">
                <option value="">Select Department</option>
                <option value="commerce">Commerce</option>
                <option value="it">IT</option>
                <option value="management">Management</option>
                <option value="law">Law</option>
            </select>
        </div>

        <div id="levelBox" class="hidden">
            <label>Level</label>
            <select id="level">
                <option value="">Select Level</option>
                <option value="ug">UG</option>
                <option value="pg">PG</option>
            </select>
        </div>

        <div id="courseBox" class="hidden">
            <label>Course</label>
            <select id="course"></select>
        </div>

        <div id="semesterBox" class="hidden">
            <label>Semester</label>
            <select id="semester"></select>
        </div>

        <div id="roleBox" class="hidden">
            <label>Role</label>
            <select id="role">
                <option value="">Select Role</option>
                <option value="pc">Program Coordinator</option>
                <option value="vac">vac</option>
            </select>
        </div>

    </div>

    <div class="buttons hidden" id="actionBox">
        <button class="btn-primary" id="viewReport">View Report</button>
        <button class="btn-outline" id="downloadReport">Download CSV</button>
    </div>

    <div id="reportBox" class="hidden" style="margin-top:30px;">
        <table id="reportTable" style="width:100%; border-collapse:collapse;">
            <thead>
                <tr>
                    <th style="text-align:left; padding:10px; border-bottom:1px solid #ddd;">Student Name</th>
                    <th style="text-align:left; padding:10px; border-bottom:1px solid #ddd;">Enrollment No.</th>
                    <th style="text-align:left; padding:10px; border-bottom:1px solid #ddd;">Phone</th>
                    <th style="text-align:left; padding:10px; border-bottom:1px solid #ddd;">Department</th>
                    <th style="text-align:left; padding:10px; border-bottom:1px solid #ddd;">Level</th>
                    <th style="text-align:left; padding:10px; border-bottom:1px solid #ddd;">Course</th>
                    <th style="text-align:left; padding:10px; border-bottom:1px solid #ddd;">Semester</th>
                    <th style="text-align:left; padding:10px; border-bottom:1px solid #ddd;">Submitted At</th>
                </tr>
            </thead>
            <tbody id="reportBody"></tbody>
        </table>
    </div>
</div>

<script>
/* ================= CONFIG ================= */
const COURSE_MAP = {
  commerce: { ug: ["B.Com"], pg: [] },
  it: { ug: ["BCA"], pg: ["MCA"] },
  management: { ug: ["BBA"], pg: ["MBA"] },
  law: { ug: ["LLB"], pg: ["LLM"] }
};

const SEMESTER_MAP = {
  "B.Com": 6,
  "BCA": 6,
  "MCA": 4,
  "BBA": 6,
  "MBA": 4,
  "LLB": 6,
  "LLM": 6
};

/* ================= JWT FETCH ================= */
async function apiFetch(url) {
  const token = localStorage.getItem("token");
  if (!token) throw new Error("AUTH_REQUIRED");

  const res = await fetch(url, {
    headers: {
      Authorization: "Bearer " + token,
      "Content-Type": "application/json"
    }
  });

  if (!res.ok) throw new Error("API_ERROR");
  return res;
}

/* ================= ELEMENTS ================= */
const department = document.getElementById("department");
const level = document.getElementById("level");
const course = document.getElementById("course");
const semester = document.getElementById("semester");
const role = document.getElementById("role");

const levelBox = document.getElementById("levelBox");
const courseBox = document.getElementById("courseBox");
const semesterBox = document.getElementById("semesterBox");
const roleBox = document.getElementById("roleBox");
const actionBox = document.getElementById("actionBox");
const reportBox = document.getElementById("reportBox");
const reportBody = document.getElementById("reportBody");

/* ================= FLOW ================= */
department.onchange = () => {
  /* RESET VALUES */
  level.value = "";
  course.innerHTML = `<option value="">Select Course</option>`;
  semester.innerHTML = `<option value="">Select Semester</option>`;
  role.value = "";

  /* HIDE DEPENDENT SECTIONS */
  levelBox.classList.add("hidden");
  courseBox.classList.add("hidden");
  semesterBox.classList.add("hidden");
  roleBox.classList.add("hidden");
  actionBox.classList.add("hidden");

  /* RE-ENABLE FLOW */
  if (department.value) {
    levelBox.classList.remove("hidden");
  }
};

level.onchange = () => {
  const list = COURSE_MAP[department.value]?.[level.value] || [];
  course.innerHTML =
    `<option value="">Select Course</option>` +
    list.map(c => `<option value="${c}">${c}</option>`).join("");
  courseBox.classList.remove("hidden");
};

course.onchange = () => {
  if (!course.value) return;
  semester.innerHTML = `<option value="">Select Semester</option>`;
  for (let i = 1; i <= (SEMESTER_MAP[course.value] || 6); i++) {
    semester.innerHTML += `<option value="${i}">Semester ${i}</option>`;
  }
  semesterBox.classList.remove("hidden");
};

semester.onchange = () => roleBox.classList.remove("hidden");
role.onchange = () => actionBox.classList.toggle("hidden", !role.value);

function normalize(value) {
  return String(value || "").trim().toLowerCase();
}

async function fetchSubmissions() {
  const token = localStorage.getItem("token");
  if (!token) throw new Error("AUTH_REQUIRED");
  const res = await fetch("/api/vac/submissions", {
    headers: { Authorization: "Bearer " + token }
  });
  if (!res.ok) throw new Error("API_ERROR");
  return res.json();
}

function applyFilters(rows) {
  const dept = normalize(department.value);
  const lvl = normalize(level.value);
  const crs = normalize(course.value);
  const sem = semester.value ? Number(semester.value) : null;

  return (rows || []).filter(r => {
    if (dept && normalize(r.department) !== dept) return false;
    if (lvl && normalize(r.level) !== lvl) return false;
    const rCourse = normalize(r.course || r.courseSelect);
    if (crs && rCourse !== crs) return false;
    if (sem && Number(r.semester) !== sem) return false;
    return true;
  });
}

function renderReport(rows) {
  reportBody.innerHTML = "";
  if (!rows.length) {
    reportBody.innerHTML =
      `<tr><td colspan="8" style="padding:12px;color:#666;">No matching student submissions found.</td></tr>`;
    return;
  }
  rows.forEach(r => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td style="padding:10px; border-bottom:1px solid #eee;">${r.studentName || "N/A"}</td>
      <td style="padding:10px; border-bottom:1px solid #eee;">${r.enrollmentNumber || "N/A"}</td>
      <td style="padding:10px; border-bottom:1px solid #eee;">${r.phoneNumber || "N/A"}</td>
      <td style="padding:10px; border-bottom:1px solid #eee;">${r.department || "N/A"}</td>
      <td style="padding:10px; border-bottom:1px solid #eee;">${r.level || "N/A"}</td>
      <td style="padding:10px; border-bottom:1px solid #eee;">${r.course || r.courseSelect || "N/A"}</td>
      <td style="padding:10px; border-bottom:1px solid #eee;">${r.semester || "N/A"}</td>
      <td style="padding:10px; border-bottom:1px solid #eee;">${r.createdAt || r.timestamp || "N/A"}</td>
    `;
    reportBody.appendChild(tr);
  });
}

document.getElementById("viewReport").onclick = async () => {
  try {
    const submissions = await fetchSubmissions();
    const filtered = applyFilters(submissions);
    reportBox.classList.remove("hidden");
    renderReport(filtered);
  } catch (err) {
    if (err && err.message === "AUTH_REQUIRED") {
      alert("Please login to view reports.");
    } else {
      alert("Failed to load report");
    }
  }
};

/* ================= CSV ================= */
document.getElementById("downloadReport").onclick = async () => {
  try {
    const submissions = await fetchSubmissions();
    const data = applyFilters(submissions);
    if (!data.length) return alert("No matching data");

    const headers = [
      "studentName",
      "enrollmentNumber",
      "phoneNumber",
      "department",
      "level",
      "course",
      "semester",
      "courseCompleted",
      "createdAt"
    ];
    const rows = data.map(r =>
      headers.map(h => `"${r[h] ?? r[h === "course" ? "courseSelect" : h] ?? ""}"`).join(",")
    );
    const csv = [headers.join(","), ...rows].join("\n");

    const blob = new Blob([csv], { type: "text/csv" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "report.csv";
    a.click();
  } catch {
    alert("CSV download failed");
  }
};
</script>

</body>
</html>
