<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Academic Reports</title>

<style>
body{
    font-family: 'Segoe UI', Arial, sans-serif;
    background:#eef1f6;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#ffffff;
    width:800px;
    padding:40px 50px;
    border-radius:16px;
    box-shadow:0 20px 40px rgba(0,0,0,0.12);
    position:relative;
}

.card::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:10px;
    background:#1f3c88;
    border-top-left-radius:16px;
    border-top-right-radius:16px;
}

h2{
    text-align:center;
    margin-top:10px;
    margin-bottom:10px;
    font-size:28px;
    color:#2c3e50;
}

.subtitle{
    text-align:center;
    color:#7f8c8d;
    margin-bottom:35px;
    font-size:14px;
}

.grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:25px 40px;
}

label{
    font-size:18px;
    font-weight:700;
    color:#2c3e50;
    margin-bottom:6px;
    display:block;
    letter-spacing:0.5px;
}

select{
    width:100%;
    padding:10px 14px;
    border-radius:8px;
    border:1px solid #dcdfe6;
    background:#f9fafc;
    font-size:14px;
    transition:all 0.2s ease;
}

select:focus{
    outline:none;
    border-color:#1f3c88;
    background:#ffffff;
    box-shadow:0 0 0 2px rgba(31,60,136,0.1);
}

select:disabled{
    background:#f1f1f1;
    color:#999;
    cursor:not-allowed;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:35px;
}

button{
    padding:10px 24px;
    border-radius:8px;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
    transition:0.2s;
}

.btn-primary{
    background:#1f3c88;
    color:white;
    border:none;
    box-shadow:0 4px 10px rgba(31,60,136,0.2);
}

.btn-primary:hover{
    background:#16306d;
}

.btn-primary:disabled{
    background:#8fa2d6;
    cursor:not-allowed;
}

.btn-outline{
    background:white;
    color:#1f3c88;
    border:1.5px solid #1f3c88;
}

.btn-outline:hover{
    background:#f4f6fb;
}

.status{
    margin-top:20px;
    text-align:center;
    font-size:14px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:30px;
}

th, td{
    padding:10px;
    border-bottom:1px solid #eee;
    font-size:13px;
}

th{
    background:#f6f8fb;
    font-weight:600;
}
</style>

</head>
<body>

<div class="card">
    <h2>Academic Reports</h2>
    <div class="subtitle">Select parameters to generate academic report</div>

    <div class="grid">
        <div>
            <label>Department</label>
            <select id="department">
                <option value="">Select Department</option>
                <option value="commerce">Commerce</option>
                <option value="it">IT</option>
                <option value="management">Management</option>
                <option value="law">Law</option>
            </select>
        </div>

        <div>
            <label>Level</label>
            <select id="level" disabled>
                <option value="">Select Level</option>
                <option value="ug">UG</option>
                <option value="pg">PG</option>
            </select>
        </div>

        <div>
            <label>Course</label>
            <select id="course" disabled>
                <option value="">Select Course</option>
            </select>
        </div>

        <div>
            <label>Semester</label>
            <select id="semester" disabled>
                <option value="">Select Semester</option>
            </select>
        </div>

        <div>
            <label>Role</label>
            <select id="role" disabled>
                <option value="">Select Role</option>
                <option value="pc">Program Coordinator</option>
                <option value="vac">VAC</option>
            </select>
        </div>
    </div>

    <div class="buttons">
        <button class="btn-primary" id="viewReport" disabled>View Report</button>
        <button class="btn-outline" id="downloadReport" disabled>Download CSV</button>
    </div>

    <div class="status" id="statusMsg"></div>
    <div class="loader" id="loader"></div>

    <div id="reportBox"></div>
</div>

<script>
const COURSE_MAP = {
  commerce: { ug: ["B.Com"], pg: [] },
  it: { ug: ["BCA"], pg: ["MCA"] },
  management: { ug: ["BBA"], pg: ["MBA"] },
  law: { ug: ["LLB"], pg: ["LLM"] }
};

const SEMESTER_MAP = {
  "B.Com": 6, "BCA": 6, "MCA": 4,
  "BBA": 6, "MBA": 4,
  "LLB": 6, "LLM": 6
};

const department = document.getElementById("department");
const level = document.getElementById("level");
const course = document.getElementById("course");
const semester = document.getElementById("semester");
const role = document.getElementById("role");
const viewBtn = document.getElementById("viewReport");
const downloadBtn = document.getElementById("downloadReport");
const statusMsg = document.getElementById("statusMsg");
const loader = document.getElementById("loader");
const reportBox = document.getElementById("reportBox");

function normalize(v){ return String(v||"").toLowerCase().trim(); }

function updateButtons(){
    const ready = department.value && level.value && course.value && semester.value && role.value;
    viewBtn.disabled = !ready;
    downloadBtn.disabled = !ready;
}

department.onchange = () => {
    level.disabled = !department.value;
    level.value="";
    course.disabled=true;
    semester.disabled=true;
    role.disabled=true;
    updateButtons();
};

level.onchange = () => {
    const list = COURSE_MAP[department.value]?.[level.value] || [];
    course.innerHTML = `<option value="">Select Course</option>` +
        list.map(c=>`<option value="${c}">${c}</option>`).join("");
    course.disabled = !list.length;
    semester.disabled = true;
    role.disabled = true;
    updateButtons();
};

course.onchange = () => {
    semester.innerHTML = `<option value="">Select Semester</option>`;
    for(let i=1;i<=SEMESTER_MAP[course.value];i++){
        semester.innerHTML += `<option value="${i}">Semester ${i}</option>`;
    }
    semester.disabled = false;
    role.disabled = true;
    updateButtons();
};

semester.onchange = () => {
    role.disabled = false;
    updateButtons();
};

role.onchange = updateButtons;

async function fetchSubmissions(){
    const token = localStorage.getItem("token");
    const res = await fetch("/api/vac/submissions",{
        headers:{ Authorization:"Bearer "+token }
    });
    if(!res.ok) throw new Error("API_ERROR");
    return res.json();
}

function render(rows){
    if(!rows.length){
        reportBox.innerHTML = "<p>No matching submissions found.</p>";
        return;
    }

    reportBox.innerHTML = `
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Enrollment</th>
                <th>Phone</th>
                <th>Dept</th>
                <th>Level</th>
                <th>Course</th>
                <th>Sem</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody>
            ${rows.map(r=>`
            <tr>
                <td>${r.studentName||"-"}</td>
                <td>${r.enrollmentNumber||"-"}</td>
                <td>${r.phoneNumber||"-"}</td>
                <td>${r.department||"-"}</td>
                <td>${r.level||"-"}</td>
                <td>${r.course||r.courseSelect||"-"}</td>
                <td>${r.semester||"-"}</td>
                <td>${r.createdAt||"-"}</td>
            </tr>`).join("")}
        </tbody>
    </table>`;
}

viewBtn.onclick = async ()=>{
    if(role.value==="pc"){
        window.location.href="pcdashboard.html";
        return;
    }

    try{
        loader.innerText="Loading...";
        statusMsg.innerText="";
        const data = await fetchSubmissions();

        const filtered = data.filter(r =>
            normalize(r.department)===normalize(department.value) &&
            normalize(r.level)===normalize(level.value) &&
            normalize(r.course||r.courseSelect)===normalize(course.value) &&
            Number(r.semester)===Number(semester.value)
        );

        loader.innerText="";
        render(filtered);

    }catch(e){
        loader.innerText="";
        statusMsg.className="status error";
        statusMsg.innerText="Failed to load report. Please login again.";
    }
};
downloadBtn.onclick = async () => {
    try {
        loader.innerText = "Preparing CSV...";
        statusMsg.innerText = "";

        const data = await fetchSubmissions();

        const filtered = data.filter(r =>
            normalize(r.department) === normalize(department.value) &&
            normalize(r.level) === normalize(level.value) &&
            normalize(r.course || r.courseSelect) === normalize(course.value) &&
            Number(r.semester) === Number(semester.value)
        );

        if (!filtered.length) {
            loader.innerText = "";
            statusMsg.className = "status error";
            statusMsg.innerText = "No matching data to download.";
            return;
        }

        const headers = [
            "studentName",
            "enrollmentNumber",
            "phoneNumber",
            "department",
            "level",
            "course",
            "semester",
            "createdAt"
        ];

        const rows = filtered.map(r =>
            headers.map(h => `"${r[h] ?? r[h === "course" ? "courseSelect" : h] ?? ""}"`).join(",")
        );

        const csvContent = [headers.join(","), ...rows].join("\n");

        const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");

        link.href = URL.createObjectURL(blob);
        link.download = "academic_report.csv";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        loader.innerText = "";
        statusMsg.className = "status success";
        statusMsg.innerText = "CSV downloaded successfully.";

    } catch (error) {
        loader.innerText = "";
        statusMsg.className = "status error";
        statusMsg.innerText = "Failed to download CSV.";
    }
};

</script>
</body>
</html>
